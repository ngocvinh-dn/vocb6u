    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .header {
        margin-bottom: 20px;
        text-align: center;
      }
      select {
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ccc;
        margin-bottom: 20px;
        cursor: pointer;
        outline: none;
      }
      .postcard {
        background: linear-gradient(135deg, #ffffff 0%, #e6f2ff 100%);
        width: 90%;
        max-width: 550px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 40px;
        text-align: center;
        position: relative;
        border: 2px solid #d1e8ff;
      }
      .word {
        font-size: 36px;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 5px;
      }
      .ipa {
        font-size: 20px;
        color: #e74c3c;
        font-family: "Courier New", Courier, monospace;
        margin-bottom: 5px;
      }
      .type {
        font-size: 18px;
        color: #7f8c8d;
        font-style: italic;
        margin-bottom: 20px;
      }
      .meaning {
        font-size: 24px;
        color: #34495e;
        margin-bottom: 30px;
        line-height: 1.4;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: bold;
      }
      .btn-listen {
        background-color: #3498db;
        color: white;
      }
      .btn-listen:hover {
        background-color: #2980b9;
      }
      .btn-nav {
        background-color: #2ecc71;
        color: white;
      }
      .btn-nav:hover {
        background-color: #27ae60;
      }
      .counter {
        margin-top: 15px;
        color: #95a5a6;
        font-size: 14px;
      }
    </style>
  </head>

    <div class="header">
      <h1>6 units vocab postcard</h1>

    <div class="postcard" id="card">

      <div class="type" id="word-type">(type)</div>
      <div class="meaning" id="vi-meaning">Nghĩa tiếng Việt</div>

      <div class="controls">
        <button class="btn-nav" onclick="prevWord()">&#8592; Trước</button>

      <div class="counter" id="counter">1 / 10</div>

      let currentUnit = 1;
      let currentIndex = 0;

      function updateCard() {
        const list = vocabData[currentUnit];
        const item = list[currentIndex];

        document.getElementById("en-word").innerText = item.word;
        document.getElementById("word-ipa").innerText = item.ipa;
        document.getElementById("word-type").innerText = item.type;
        document.getElementById("vi-meaning").innerText = item.vi;
        document.getElementById("counter").innerText =
          `${currentIndex + 1} / ${list.length}`;

        // Tự động phát âm (Có thể xóa dòng này nếu không muốn tự động đọc)
        speakWord();
      }

      function changeUnit() {
        currentUnit = document.getElementById("unitSelect").value;
        currentIndex = 0;
        updateCard();
      }

      function nextWord() {
        if (currentIndex < vocabData[currentUnit].length - 1) {
          currentIndex++;
          updateCard();
        }
      }

      function prevWord() {
        if (currentIndex > 0) {
          currentIndex--;
          updateCard();
        }
      }

      function speakWord() {
        const wordToSpeak = document.getElementById("en-word").innerText;
        // Xóa bớt các chữ trong ngoặc đơn nếu có (như (ALU), (LCD), (GUI)) để AI không đọc chữ trong ngoặc
        const cleanWord = wordToSpeak.replace(/\s*\(.*?\)\s*/g, "");
        const utterance = new SpeechSynthesisUtterance(cleanWord);
        utterance.lang = "en-US";
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }

      updateCard();
    </script>
